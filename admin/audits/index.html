<!DOCTYPE html>
<html lang="en" data-theme="light">
<script>try{var st=localStorage.getItem('moonraker-theme');if(st){document.documentElement.setAttribute('data-theme',st)}}catch(e){}</script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audits - Moonraker Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

:root, [data-theme="light"] {
  --color-primary: #00D47E; --color-primary-hover: #00b86c; --color-primary-light: #B4EEE0;
  --color-primary-subtle: #DDF8F2; --color-bg: #F7FDFB; --color-surface: #FFFFFF;
  --color-border: #E2E8F0; --color-heading: #1E2A5E; --color-body: #333F70;
  --color-muted: #6B7599; --color-navy: #141C3A; --color-success: #00D47E;
  --color-warning: #F59E0B; --color-danger: #EF4444; --color-info: #3B82F6;
  --sidebar-bg: #FAFDFB; --sidebar-border: #E8F0EC; --sidebar-hover: #EEF8F3;
}
[data-theme="dark"] {
  --color-primary: #00D47E; --color-primary-hover: #00f598; --color-primary-light: #1A4A38;
  --color-primary-subtle: #0D2E22; --color-bg: #080F0B; --color-surface: #0E1A14;
  --color-border: #1E3530; --color-heading: #E8F5EF; --color-body: #C8D8D0;
  --color-muted: #5A7A6E; --color-navy: #0A1630; --color-success: #00D47E;
  --color-warning: #F59E0B; --color-danger: #FF6B6B; --color-info: #60A5FA;
  --sidebar-bg: #0A120E; --sidebar-border: #162820; --sidebar-hover: #12201A;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 400; color: var(--color-body); background: var(--color-bg); line-height: 1.6; -webkit-font-smoothing: antialiased; transition: background .3s, color .3s; overflow-x: hidden; }
h1,h2,h3,h4 { font-family: 'Outfit', sans-serif; font-weight: 700; color: var(--color-heading); line-height: 1.2; }
a { color: var(--color-primary); text-decoration: none; }
a:hover { color: var(--color-primary-hover); }

.sidebar { width: 240px; background: var(--sidebar-bg); border-right: 1px solid var(--sidebar-border); position: fixed; top: 0; left: 0; bottom: 0; z-index: 200; display: flex; flex-direction: column; transition: transform .25s ease; }
.sidebar-header { padding: 1.25rem 1.25rem .75rem; display: flex; align-items: center; gap: .75rem; }
.sidebar-header img { height: 22px; opacity: .7; }
.sidebar-header span { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: .85rem; color: var(--color-heading); }
.sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.sidebar-nav a { display: flex; align-items: center; gap: .65rem; padding: .55rem .75rem; border-radius: 8px; font-size: .82rem; font-weight: 500; color: var(--color-muted); text-decoration: none; transition: all .15s; }
.sidebar-nav a:hover { background: var(--sidebar-hover); color: var(--color-heading); }
.sidebar-nav a.active { background: var(--color-primary-subtle); color: var(--color-primary); font-weight: 600; }
.sidebar-nav .nav-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: .95rem; flex-shrink: 0; opacity: .7; }
.sidebar-nav a.active .nav-icon { opacity: 1; }
.nav-section { font-size: .65rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--color-muted); padding: .75rem .75rem .25rem; opacity: .6; }
.sidebar-footer { padding: .75rem 1rem; border-top: 1px solid var(--sidebar-border); }

.main { flex: 1; margin-left: 240px; min-width: 0; }
.topbar { position: sticky; top: 0; z-index: 100; background: var(--color-surface); border-bottom: 1px solid var(--color-border); padding: 0 2rem; height: 56px; display: flex; align-items: center; gap: 1rem; }
.topbar-right { display: flex; align-items: center; gap: .5rem; margin-left: auto; }
.content { padding: 2rem; max-width: 1400px; }

.tag { display: inline-flex; align-items: center; gap: .3rem; padding: .15rem .5rem; border-radius: 6px; font-size: .72rem; font-weight: 500; white-space: nowrap; }
.tag-active { background: rgba(0,212,126,.1); color: var(--color-success); }
.tag-onboarding { background: rgba(59,130,246,.08); color: var(--color-info); }
.tag-moonraker { background: rgba(0,212,126,.12); color: #00b86c; }
.tag-client { background: rgba(59,130,246,.1); color: #3B82F6; }
.tag-collab, .tag-collaboration { background: rgba(245,158,11,.1); color: #D97706; }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 12px; padding: 1.25rem; }
.stat-card .stat-label { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--color-muted); margin-bottom: .35rem; }
.stat-card .stat-value { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 700; color: var(--color-heading); line-height: 1; }
.stat-card .stat-sub { font-size: .75rem; color: var(--color-muted); margin-top: .35rem; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .25rem; }
.section-header h2 { font-size: 1.35rem; margin: 0; }
.section-desc { font-size: .84rem; color: var(--color-muted); margin-bottom: 1.5rem; }

/* Client audit cards */
.audit-cards { display: grid; gap: 1.25rem; }
.audit-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 12px; overflow: hidden; transition: border-color .2s; }
.audit-card:hover { border-color: rgba(0,212,126,.3); }
.audit-card-header { display: flex; align-items: center; gap: .75rem; padding: 1rem 1.25rem; border-bottom: 1px solid var(--color-border); cursor: pointer; }
.audit-card-header:hover { background: var(--sidebar-hover); }
.audit-avatar { width: 36px; height: 36px; border-radius: 9px; background: var(--color-primary-subtle); color: var(--color-primary); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: .8rem; flex-shrink: 0; }
.audit-card-info { flex: 1; min-width: 0; }
.audit-card-name { font-weight: 600; font-size: .9rem; color: var(--color-heading); }
.audit-card-meta { font-size: .75rem; color: var(--color-muted); display: flex; gap: .5rem; align-items: center; }
.audit-card-scores { display: flex; gap: .75rem; align-items: center; flex-shrink: 0; }
.mini-score { text-align: center; }
.mini-score-val { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: .85rem; color: var(--color-heading); line-height: 1; }
.mini-score-label { font-size: .55rem; color: var(--color-muted); text-transform: uppercase; letter-spacing: .03em; }
.audit-card-pct { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem; min-width: 48px; text-align: right; }

.audit-card-body { padding: 1rem 1.25rem; }

/* Task breakdown bars */
.task-breakdown { display: flex; gap: 1rem; margin-bottom: .75rem; flex-wrap: wrap; }
.task-breakdown-item { display: flex; align-items: center; gap: .35rem; font-size: .75rem; }
.task-breakdown-dot { width: 8px; height: 8px; border-radius: 2px; }
.task-breakdown-dot.complete { background: var(--color-success); }
.task-breakdown-dot.in-progress { background: var(--color-info); }
.task-breakdown-dot.not-started { background: var(--color-border); }

/* Owner breakdown */
.owner-breakdown { display: flex; gap: .75rem; flex-wrap: wrap; }
.owner-pill { display: flex; align-items: center; gap: .3rem; padding: .2rem .55rem; border-radius: 6px; font-size: .72rem; font-weight: 500; }

/* Stacked bar */
.stacked-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; background: var(--color-bg); margin-bottom: .75rem; }
.stacked-bar .seg { height: 100%; transition: width .5s; }
.stacked-bar .seg-complete { background: var(--color-success); }
.stacked-bar .seg-ip { background: var(--color-info); }
.stacked-bar .seg-ns { background: var(--color-border); }

/* Links row */
.audit-links { display: flex; gap: .5rem; flex-wrap: wrap; }
.audit-link { display: inline-flex; align-items: center; gap: .3rem; padding: .25rem .55rem; border-radius: 6px; font-size: .72rem; font-weight: 500; border: 1px solid var(--color-border); color: var(--color-heading); transition: all .15s; }
.audit-link:hover { border-color: var(--color-primary); color: var(--color-primary); }

.empty-state { text-align: center; padding: 3rem; color: var(--color-muted); }
.spinner { width: 20px; height: 20px; border: 2px solid var(--color-border); border-top-color: var(--color-primary); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

.theme-toggle { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .9rem; transition: all .2s; }
.theme-toggle:hover { border-color: var(--color-primary); }

.mobile-toggle { display: none; background: none; border: none; color: var(--color-heading); font-size: 1.25rem; cursor: pointer; padding: .25rem; }
@media (max-width: 860px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,.15); }
  .main { margin-left: 0; }
  .mobile-toggle { display: block; }
  .audit-card-scores { display: none; }
}
@media (max-width: 560px) {
  .content { padding: 1rem; }
  .topbar { padding: 0 1rem; }
}

/* ---- COLLAPSIBLE SIDEBAR ---- */
.sidebar { transition: width .25s ease, transform .25s ease; overflow: hidden; }

/* Nav links: fixed padding, never changes between states */
.sidebar-nav { padding: .5rem .5rem; }
.sidebar-nav a { padding: .5rem .65rem; gap: .65rem; display: flex; align-items: center; border-radius: 8px; }
.sidebar-nav .nav-icon { width: 18px; min-width: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sidebar-nav .nav-icon svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.25; stroke-linecap: round; stroke-linejoin: round; opacity: .65; }
.sidebar-nav a.active .nav-icon svg { opacity: 1; }
.sidebar-nav a:hover .nav-icon svg { opacity: 1; }
.sidebar-nav .nav-label { white-space: nowrap; overflow: hidden; }
.nav-section { margin: 0 .5rem; }

/* Collapsed: ONLY hide text and shrink width. No padding/margin changes. */
.sidebar.collapsed { width: 56px; }
.sidebar.collapsed .sidebar-header span { opacity: 0; position: absolute; }
.sidebar.collapsed .sidebar-nav .nav-label { opacity: 0; position: absolute; }
.sidebar.collapsed .nav-section { font-size: 0; padding-top: .35rem; padding-bottom: .15rem; opacity: 0; }
.sidebar.collapsed .sidebar-footer { flex-direction: column; gap: .35rem; padding: .5rem; align-items: center; }

/* Hover expand: fade text back in */
.sidebar.collapsed:hover { width: 240px; box-shadow: 4px 0 20px rgba(0,0,0,.1); z-index: 250; }
.sidebar.collapsed:hover .sidebar-header span { opacity: 1; position: static; }
.sidebar.collapsed:hover .sidebar-nav .nav-label { opacity: 1; position: static; }
.sidebar.collapsed:hover .nav-section { font-size: .65rem; padding-top: .65rem; padding-bottom: .25rem; opacity: .6; }
.sidebar.collapsed:hover .sidebar-footer { flex-direction: row; gap: 0; padding: .75rem 1rem; align-items: center; justify-content: space-between; }

/* Main shift */
.main { transition: margin-left .25s ease; }
.sidebar.collapsed ~ .main { margin-left: 56px; }

/* Collapse button */
.collapse-btn { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 50%; color: var(--color-muted); cursor: pointer; transition: all .2s; flex-shrink: 0; padding: 0; }
.collapse-btn:hover { color: var(--color-heading); border-color: var(--color-primary); background: var(--color-primary-subtle); }
.collapse-btn svg { transition: transform .25s; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.sidebar.collapsed .collapse-btn svg { transform: rotate(180deg); }

/* Footer */
.sidebar-footer { display: flex; align-items: center; justify-content: space-between; transition: all .2s; }
.theme-toggle { flex-shrink: 0; }

/* Mobile */
@media (max-width: 860px) {
  .sidebar.collapsed { width: 240px; transform: translateX(-100%); }
  .sidebar.collapsed.open { transform: translateX(0); }
  .sidebar.collapsed ~ .main { margin-left: 0; }
  .sidebar.collapsed .sidebar-header span { opacity: 1; position: static; }
  .sidebar.collapsed .sidebar-nav .nav-label { opacity: 1; position: static; }
  .sidebar.collapsed .nav-section { font-size: .65rem; padding-top: .65rem; padding-bottom: .25rem; opacity: .6; }
  .sidebar.collapsed .sidebar-footer { flex-direction: row; gap: 0; padding: .75rem 1rem; justify-content: space-between; }
}

</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <img src="https://moonraker.ai/wp-content/uploads/2023/10/Moonraker-Logo-Transparent.png" alt="Moonraker">
    <span>Client HQ</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Overview</div>
    <a href="/admin"><span class="nav-icon"><svg viewBox="0 0 16 16"><rect x="1.5" y="1.5" width="5" height="5" rx="1"/><rect x="9.5" y="1.5" width="5" height="5" rx="1"/><rect x="1.5" y="9.5" width="5" height="5" rx="1"/><rect x="9.5" y="9.5" width="5" height="5" rx="1"/></svg></span><span class="nav-label">Dashboard</span></a>
    <a href="/admin/clients"><span class="nav-icon"><svg viewBox="0 0 16 16"><circle cx="8" cy="4.5" r="2.5"/><path d="M2.5 15c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5"/></svg></span><span class="nav-label">Clients</span></a>
    <div class="nav-section">Workflows</div>
    <a href="/admin/onboarding"><span class="nav-icon"><svg viewBox="0 0 16 16"><path d="M8 1v10M4.5 7.5L8 11l3.5-3.5"/><path d="M2.5 13.5h11"/></svg></span><span class="nav-label">Onboarding</span></a>
    <a href="/admin/audits" class="active"><span class="nav-icon"><svg viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4"/><path d="M14.5 14.5l-4-4"/></svg></span><span class="nav-label">Audits</span></a>
    <a href="/admin/deliverables"><span class="nav-icon"><svg viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5.5 8l2 2 3.5-3.5"/></svg></span><span class="nav-label">Deliverables</span></a>
    <a href="/admin/reports"><span class="nav-icon"><svg viewBox="0 0 16 16"><path d="M2 14V6l3.5-2v10"/><path d="M6.25 14V4.5l3.5-2v11.5"/><path d="M10.5 14V3l3.5-2v13"/></svg></span><span class="nav-label">Reports</span></a>
  </nav>
  <div class="sidebar-footer">
    <button class="collapse-btn" id="collapseBtn" aria-label="Collapse sidebar"><svg viewBox="0 0 16 16" width="14" height="14"><path d="M10 3L5 8l5 5"/></svg></button>
    <button class="theme-toggle" id="themeBtn" aria-label="Toggle theme">&#x1F319;</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="mobile-toggle" id="mobileToggle" aria-label="Menu">&#9776;</button>
    <div style="font-family:'Outfit',sans-serif;font-weight:600;font-size:.95rem;color:var(--color-heading);">Audit Pipeline</div>
    <div class="topbar-right">
      <span style="font-size:.78rem;color:var(--color-muted);" id="lastRefresh"></span>
    </div>
  </div>

  <div class="content">
    <div class="section-header">
      <h2>Audit Tasks</h2>
    </div>
    <p class="section-desc">CORE audit task progress across all clients. Click any client to view their full audit details.</p>

    <div class="stat-grid" id="statGrid"></div>
    <div class="audit-cards" id="auditCards"></div>

    <div id="loadingState" style="text-align:center;padding:4rem;">
      <div class="spinner" style="width:24px;height:24px;"></div>
      <p style="margin-top:.75rem;font-size:.85rem;color:var(--color-muted);">Loading audit data...</p>
    </div>

    <div class="empty-state" id="emptyState" style="display:none;">
      <p>No audits found yet. Run a Surge audit to get started.</p>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var SB = 'https://ofmmwcjhdrhvxxkhcuww.supabase.co';
  var SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mbW13Y2poZHJodnh4a2hjdXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjM1NTcsImV4cCI6MjA4OTg5OTU1N30.zMMHW0Fk9ixWjORngyxJTIoPOfx7GFsD4wBV4Foqqms';

  var state = { contacts: [], tasks: {}, scores: {} };

  function sb(path) {
    return fetch(SB + '/rest/v1/' + path, {
      headers: { 'apikey': SK, 'Authorization': 'Bearer ' + SK }
    }).then(function(r) { return r.json(); });
  }

  function loadData() {
    Promise.all([
      sb('contacts?select=id,slug,status,practice_name,email,first_name,last_name,website_url&order=practice_name'),
      sb('checklist_items?select=client_slug,status,owner,priority,category,title&order=client_slug,sort_order'),
      sb('audit_scores?select=client_slug,variance_score,score_credibility,score_optimization,score_reputation,score_engagement,audit_date&order=audit_date.desc')
    ]).then(function(res) {
      state.contacts = res[0] || [];

      // Index tasks by slug
      state.tasks = {};
      (res[1] || []).forEach(function(t) {
        if (!state.tasks[t.client_slug]) state.tasks[t.client_slug] = [];
        state.tasks[t.client_slug].push(t);
      });

      // Index scores by slug (latest only)
      state.scores = {};
      (res[2] || []).forEach(function(s) {
        if (!state.scores[s.client_slug]) state.scores[s.client_slug] = s;
      });

      document.getElementById('loadingState').style.display = 'none';
      renderStats();
      renderCards();
      document.getElementById('lastRefresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
    });
  }

  function renderStats() {
    var allTasks = [];
    Object.values(state.tasks).forEach(function(arr) { allTasks = allTasks.concat(arr); });

    var complete = allTasks.filter(function(t) { return t.status === 'complete'; }).length;
    var ip = allTasks.filter(function(t) { return t.status === 'in-progress'; }).length;
    var ns = allTasks.filter(function(t) { return t.status === 'not-started'; }).length;
    var clientCount = Object.keys(state.tasks).length;
    var pct = allTasks.length > 0 ? Math.round(complete / allTasks.length * 100) : 0;

    // Owner counts
    var owners = { Moonraker: 0, Client: 0, Collaboration: 0 };
    allTasks.forEach(function(t) { if (t.owner && owners.hasOwnProperty(t.owner)) owners[t.owner]++; });

    document.getElementById('statGrid').innerHTML =
      '<div class="stat-card"><div class="stat-label">Audited Clients</div><div class="stat-value">' + clientCount + '</div><div class="stat-sub">with active tasks</div></div>' +
      '<div class="stat-card"><div class="stat-label">Total Tasks</div><div class="stat-value">' + allTasks.length + '</div><div class="stat-sub">' + pct + '% complete</div></div>' +
      '<div class="stat-card"><div class="stat-label">Complete</div><div class="stat-value" style="color:var(--color-success);">' + complete + '</div></div>' +
      '<div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value" style="color:var(--color-info);">' + ip + '</div></div>' +
      '<div class="stat-card"><div class="stat-label">Not Started</div><div class="stat-value">' + ns + '</div></div>' +
      '<div class="stat-card"><div class="stat-label">Moonraker Tasks</div><div class="stat-value">' + owners.Moonraker + '</div><div class="stat-sub">' + owners.Client + ' client, ' + owners.Collaboration + ' collab</div></div>';
  }

  function renderCards() {
    var slugs = Object.keys(state.tasks);
    if (slugs.length === 0) {
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    // Build client lookup
    var contactMap = {};
    state.contacts.forEach(function(c) { contactMap[c.slug] = c; });

    // Sort by completion % ascending (most work remaining first)
    slugs.sort(function(a, b) {
      var ta = state.tasks[a], tb = state.tasks[b];
      var pctA = ta.filter(function(t) { return t.status === 'complete'; }).length / ta.length;
      var pctB = tb.filter(function(t) { return t.status === 'complete'; }).length / tb.length;
      return pctA - pctB;
    });

    var html = '';
    slugs.forEach(function(slug) {
      var tasks = state.tasks[slug];
      var c = contactMap[slug] || { slug: slug, practice_name: slug, first_name: '', last_name: '', email: '' };
      var scores = state.scores[slug];
      var initials = ((c.first_name || '')[0] || '') + ((c.last_name || '')[0] || '') || slug[0].toUpperCase();

      var complete = tasks.filter(function(t) { return t.status === 'complete'; }).length;
      var ip = tasks.filter(function(t) { return t.status === 'in-progress'; }).length;
      var ns = tasks.filter(function(t) { return t.status === 'not-started'; }).length;
      var pct = Math.round(complete / tasks.length * 100);

      var owners = {};
      tasks.forEach(function(t) { if (t.owner) owners[t.owner] = (owners[t.owner] || 0) + 1; });

      html += '<div class="audit-card">';

      // Header
      html += '<div class="audit-card-header" onclick="window.location.href=\'/admin/clients?slug=' + slug + '\'">';
      html += '<div class="audit-avatar">' + esc(initials.toUpperCase()) + '</div>';
      html += '<div class="audit-card-info"><div class="audit-card-name">' + esc(c.practice_name || slug) + '</div>';
      html += '<div class="audit-card-meta"><span class="tag tag-' + (c.status || 'lead') + '">' + (c.status || 'unknown') + '</span>';
      if (scores) html += '<span>Variance: ' + (scores.variance_score || '--') + '/100</span>';
      if (scores && scores.audit_date) html += '<span>Audited: ' + formatDate(scores.audit_date) + '</span>';
      html += '</div></div>';

      // Mini CORE scores
      if (scores) {
        html += '<div class="audit-card-scores">';
        var pillars = [
          { key: 'score_credibility', label: 'C' },
          { key: 'score_optimization', label: 'O' },
          { key: 'score_reputation', label: 'R' },
          { key: 'score_engagement', label: 'E' }
        ];
        pillars.forEach(function(p) {
          var val = scores[p.key];
          html += '<div class="mini-score"><div class="mini-score-val">' + (val != null ? val.toFixed(1) : '--') + '</div><div class="mini-score-label">' + p.label + '</div></div>';
        });
        html += '</div>';
      }

      html += '<div class="audit-card-pct" style="color:' + (pct === 100 ? 'var(--color-success)' : 'var(--color-heading)') + ';">' + pct + '%</div>';
      html += '</div>';

      // Body
      html += '<div class="audit-card-body">';

      // Stacked bar
      var cPct = Math.round(complete / tasks.length * 100);
      var iPct = Math.round(ip / tasks.length * 100);
      html += '<div class="stacked-bar">';
      if (cPct > 0) html += '<div class="seg seg-complete" style="width:' + cPct + '%;"></div>';
      if (iPct > 0) html += '<div class="seg seg-ip" style="width:' + iPct + '%;"></div>';
      html += '</div>';

      // Task breakdown
      html += '<div class="task-breakdown">';
      html += '<div class="task-breakdown-item"><span class="task-breakdown-dot complete"></span> ' + complete + ' complete</div>';
      html += '<div class="task-breakdown-item"><span class="task-breakdown-dot in-progress"></span> ' + ip + ' in progress</div>';
      html += '<div class="task-breakdown-item"><span class="task-breakdown-dot not-started"></span> ' + ns + ' not started</div>';
      html += '</div>';

      // Owner breakdown
      html += '<div class="owner-breakdown">';
      Object.keys(owners).forEach(function(o) {
        var cls = 'tag-' + o.toLowerCase();
        html += '<span class="owner-pill tag ' + cls + '">' + esc(o) + ': ' + owners[o] + '</span>';
      });
      html += '</div>';

      // Links
      html += '<div class="audit-links" style="margin-top:.75rem;">';
      html += '<a href="/' + slug + '/audits/diagnosis" target="_blank" class="audit-link">Diagnosis</a>';
      html += '<a href="/' + slug + '/audits/action-plan" target="_blank" class="audit-link">Action Plan</a>';
      html += '<a href="/' + slug + '/audits/progress" target="_blank" class="audit-link">Progress</a>';
      html += '<a href="/admin/clients?slug=' + slug + '" class="audit-link" style="border-color:var(--color-primary);color:var(--color-primary);">Full Profile</a>';
      html += '</div>';

      html += '</div></div>';
    });

    document.getElementById('auditCards').innerHTML = html;
  }

  function formatDate(d) {
    if (!d) return '';
    try { return new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); }
    catch(e) { return d; }
  }

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // ============================================================
  // SIDEBAR COLLAPSE
  // ============================================================
  var sidebar = document.getElementById('sidebar');
  var collapseBtn = document.getElementById('collapseBtn');
  try { if (localStorage.getItem('moonraker-sidebar') === 'collapsed') sidebar.classList.add('collapsed'); } catch(e) {}
  if (collapseBtn) collapseBtn.addEventListener('click', function() {
    sidebar.classList.toggle('collapsed');
    try { localStorage.setItem('moonraker-sidebar', sidebar.classList.contains('collapsed') ? 'collapsed' : 'open'); } catch(e) {}
  });
  // Mobile sidebar
  var mobileToggle = document.getElementById('mobileToggle');
  if (mobileToggle) mobileToggle.addEventListener('click', function() { sidebar.classList.toggle('open'); });
  // Theme
  var themeBtn = document.getElementById('themeBtn');
  var _curTheme = document.documentElement.getAttribute('data-theme');
  if (themeBtn) {
    themeBtn.innerHTML = _curTheme === 'dark' ? '&#9728;&#65039;' : '&#x1F319;';
    themeBtn.addEventListener('click', function() {
      var h = document.documentElement;
      if (h.getAttribute('data-theme') === 'light') {
        h.setAttribute('data-theme', 'dark'); themeBtn.innerHTML = '&#9728;&#65039;';
        try { localStorage.setItem('moonraker-theme', 'dark'); } catch(e) {}
      } else {
        h.setAttribute('data-theme', 'light'); themeBtn.innerHTML = '&#x1F319;';
        try { localStorage.setItem('moonraker-theme', 'light'); } catch(e) {}
      }
    });
  }
  loadData();
})();
</script>
</body>
</html>
