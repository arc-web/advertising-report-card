<!DOCTYPE html>
<html lang="en" data-theme="light">
<script>try{var st=localStorage.getItem('moonraker-theme');if(st){document.documentElement.setAttribute('data-theme',st)}}catch(e){}</script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/assets/logo.png">
<title>Progress Tracker - Moonraker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root,[data-theme="light"]{--color-primary:#00D47E;--color-primary-hover:#00b86c;--color-primary-subtle:#DDF8F2;--color-bg:#F7FDFB;--color-surface:#FFFFFF;--color-border:#E2E8F0;--color-heading:#1E2A5E;--color-body:#333F70;--color-muted:#6B7599;--color-navy:#141C3A;--color-success:#00D47E;--color-warning:#F59E0B;--color-danger:#EF4444;--color-info:#3B82F6}
[data-theme="dark"]{--color-primary:#00D47E;--color-primary-hover:#00f598;--color-primary-subtle:#0D2E22;--color-bg:#080F0B;--color-surface:#0E1A14;--color-border:#1E3530;--color-heading:#E8F5EF;--color-body:#C8D8D0;--color-muted:#5A7A6E;--color-navy:#0A1630;--color-success:#00D47E;--color-warning:#F59E0B;--color-danger:#FF6B6B;--color-info:#60A5FA}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;color:var(--color-body);background:var(--color-bg);line-height:1.7;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Outfit',sans-serif;font-weight:700;color:var(--color-heading);line-height:1.15}
h1{font-size:2.75rem;font-weight:800;letter-spacing:-0.02em}
h2{font-size:2rem;margin-bottom:.75rem}
h3{font-size:1.35rem}
p{margin-bottom:1rem}
a{color:var(--color-primary);text-decoration:none}
strong{font-weight:600;color:var(--color-heading)}
.container{max-width:1060px;margin:0 auto;padding:0 3rem}
@media(max-width:768px){.container{padding:0 1.5rem}h1{font-size:2rem}}
section{padding:3.5rem 0}
.divider{height:1px;background:var(--color-border);border:none;margin:0}
.header{background:var(--color-navy);padding:2rem 0;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-60%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(0,212,126,.08) 0%,transparent 70%);pointer-events:none}
.header-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.header img{height:36px}
.header-meta{text-align:right}
.header-meta p{margin:0;font-size:.8125rem;color:rgba(232,245,239,.45)}
.header-meta .name{color:#E8F5EF;font-weight:600;font-size:.9375rem}
.theme-toggle{position:fixed;top:1.25rem;right:1.25rem;z-index:200;background:var(--color-surface);border:1px solid var(--color-border);border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.15rem;transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.theme-toggle:hover{border-color:var(--color-primary)}
.suite-nav{position:fixed;top:5rem;right:1.25rem;z-index:200;display:flex;flex-direction:column;gap:.35rem}
.suite-nav a{padding:.4rem .85rem;border:1px solid var(--color-border);border-radius:6px;font-weight:600;font-size:.75rem;color:var(--color-muted);transition:all .2s;background:var(--color-surface);box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center}
.suite-nav a:hover{border-color:var(--color-primary);color:var(--color-primary)}
.suite-nav a.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
@media(max-width:860px){.suite-nav{position:static;flex-direction:row;margin:1.5rem auto;justify-content:center}
.suite-nav a{font-size:.8rem;padding:.5rem 1rem}}
.progress-line{position:fixed;top:0;left:0;height:3px;background:var(--color-primary);width:0%;z-index:999;transition:width .1s linear;box-shadow:0 0 8px rgba(0,212,126,.4)}
.section-nav{position:fixed;right:2rem;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:2px}
@media(max-width:1140px){.section-nav{display:none}}
.section-nav a{display:flex;align-items:center;gap:10px;padding:6px 12px 6px 8px;border-radius:8px;font-size:.75rem;font-weight:500;color:var(--color-muted);text-decoration:none;transition:all .25s;white-space:nowrap}
.section-nav a:hover{color:var(--color-heading);background:var(--color-surface)}
.section-nav a.active{color:var(--color-primary);background:var(--color-primary-subtle)}
.section-nav .nav-dot{width:6px;height:6px;border-radius:50%;background:var(--color-border);flex-shrink:0;transition:all .25s}
.section-nav a.active .nav-dot{background:var(--color-primary);width:8px;height:8px;box-shadow:0 0 6px rgba(0,212,126,.5)}
@media print{.section-nav,.theme-toggle,.progress-line,.suite-nav{display:none !important}}
::view-transition-old(root),::view-transition-new(root){animation-duration:.25s}
.task-detail code{background:rgba(0,212,126,.08);border:1px solid rgba(0,212,126,.2);border-radius:6px;padding:.15rem .4rem;font-size:.8125rem;font-family:'SF Mono','Fira Code',monospace;color:var(--color-heading);overflow-wrap:break-word;word-break:break-all}
.task-detail pre{background:var(--color-navy);color:#E8F5EF;border-radius:10px;padding:1rem 1.25rem;margin:.75rem 0;overflow-x:auto;font-size:.8125rem;line-height:1.6;max-width:100%;box-sizing:border-box}
.task-detail pre code{background:none;border:none;padding:0;color:inherit;white-space:pre-wrap;word-break:break-word}
.hero{padding:5.5rem 0 4rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-100px;right:-80px;width:500px;height:500px;background:radial-gradient(circle at 30% 40%,rgba(0,212,126,.06) 0%,transparent 60%);pointer-events:none}
.hero-layout{display:grid;grid-template-columns:1fr 280px;gap:3rem;align-items:center}
@media(max-width:768px){.hero-layout{grid-template-columns:1fr}.hero-visual{display:none}}
.hero-content{position:relative;z-index:1}
.hero h1{margin-bottom:1rem}
.hero .subtitle{font-size:1.0625rem;color:var(--color-muted);max-width:520px;line-height:1.7}
.badge{display:inline-block;background:var(--color-primary-subtle);color:var(--color-primary);font-weight:600;font-size:.75rem;padding:.4rem 1rem;border-radius:100px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:1rem}
.hero-visual svg{width:100%;height:auto}
/* Progress hero */
.progress-hero{padding:1rem 0}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin:1.5rem 0}
.stat-box{background:var(--color-surface);border:1px solid var(--color-border);border-radius:10px;padding:1rem;text-align:center}
.stat-val{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.5rem;color:var(--color-heading);line-height:1}
.stat-label{font-size:.6875rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-muted);margin-top:.3rem}
.progress-ring-wrap{position:relative;width:200px;height:200px;margin:0 auto}
.progress-ring-bg,.progress-ring-fg{fill:none;stroke-linecap:round}
.progress-ring-bg{stroke:var(--color-border);stroke-width:10}
.progress-ring-fg{stroke:var(--color-primary);stroke-width:10;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);transform:rotate(-90deg);transform-origin:center}
.progress-ring-val{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.progress-ring-val .pct-num{font-family:'Outfit',sans-serif;font-weight:800;font-size:3rem;line-height:1;color:var(--color-primary)}
.progress-ring-val .pct-sign{font-size:1.25rem;color:var(--color-muted)}
.progress-ring-val .pct-label{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--color-muted);margin-top:.25rem}
/* Task list */
.task-item{display:flex;align-items:center;gap:.75rem;padding:.85rem 1.25rem;border-radius:10px;margin-bottom:.5rem;background:var(--color-surface);border:1px solid var(--color-border);cursor:pointer;transition:all .2s;user-select:none}
.task-item:hover{border-color:rgba(0,212,126,.25)}
.task-item.complete{opacity:.65}
.task-item.complete .task-text-title{text-decoration:line-through}
.task-item.expanded{border-color:var(--color-primary);border-bottom-left-radius:0;border-bottom-right-radius:0;margin-bottom:0}
.task-detail{display:none;padding:1rem 1.25rem 1.25rem;background:var(--color-bg);border:1px solid var(--color-primary);border-top:none;border-radius:0 0 10px 10px;margin-bottom:.5rem;font-size:.9375rem;line-height:1.7}
.task-detail.open{display:block}
.task-detail p{margin-bottom:.75rem}
.task-detail ol,.task-detail ul{margin:0 0 .75rem 1.25rem}
.task-detail li{margin-bottom:.35rem}
.task-detail pre{background:var(--color-surface);border:1px solid var(--color-border);border-radius:8px;padding:.75rem 1rem;overflow-x:auto;font-size:.8125rem;margin-bottom:.75rem}
.task-detail code{font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:.8125rem}
.task-detail-label{font-size:.6875rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--color-muted);margin-bottom:.35rem}
.task-expand-arrow{font-size:.6rem;color:var(--color-muted);transition:transform .2s;flex-shrink:0;width:16px;text-align:center}
.task-item.expanded .task-expand-arrow{transform:rotate(90deg)}
.task-check{width:24px;height:24px;border-radius:6px;border:2px solid var(--color-border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:.75rem}
.task-item.complete .task-check{background:var(--color-success);border-color:var(--color-success);color:#fff}
.task-item.in_progress .task-check{background:var(--color-info);border-color:var(--color-info);color:#fff}
.task-text{flex:1;min-width:0}
.task-text-title{font-weight:600;font-size:.9375rem;color:var(--color-heading)}
.task-text-meta{font-size:.75rem;color:var(--color-muted);display:flex;gap:.5rem;align-items:center;margin-top:.1rem}
.task-owner-tag{font-size:.6875rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:.1rem .4rem;border-radius:3px}
.task-owner-tag.moonraker{background:rgba(0,212,126,.1);color:#00b86c}
.task-owner-tag.client{background:rgba(59,130,246,.1);color:#3B82F6}
.task-owner-tag.collaboration{background:rgba(245,158,11,.1);color:#D97706}
.task-priority-tag{font-size:.6875rem;font-weight:700;color:var(--color-muted)}
.save-status{font-size:.78rem;color:var(--color-muted);text-align:right;margin-top:.5rem}
/* RTPBA */
.rtpba-section{background:var(--color-surface);border:1px solid var(--color-border);border-radius:14px;padding:2rem;margin-top:2rem}
.rtpba-section h4{margin-bottom:1rem;color:var(--color-primary)}
.rtpba-section p{font-size:.9375rem;line-height:1.7}
.rtpba-section ul,.rtpba-section ol{margin:0 0 1rem 1.5rem;font-size:.9375rem}
.rtpba-section li{margin-bottom:.35rem}
.footer{text-align:center;padding:3rem 0;font-size:.8125rem;color:var(--color-muted)}
.loading-state{text-align:center;padding:8rem 2rem}
.spinner{width:32px;height:32px;border:3px solid var(--color-border);border-top-color:var(--color-primary);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.phase-label{font-family:'Outfit',sans-serif;font-weight:700;font-size:1.1rem;color:var(--color-heading);margin:2rem 0 .75rem;padding-bottom:.5rem;border-bottom:1px solid var(--color-border)}
.filter-pills{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.25rem}
.filter-pill{padding:.35rem .85rem;border:1px solid var(--color-border);border-radius:100px;font-size:.75rem;font-weight:600;color:var(--color-muted);cursor:pointer;transition:all .2s;background:var(--color-surface)}
.filter-pill:hover{border-color:var(--color-primary);color:var(--color-primary)}
.filter-pill.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
.filter-pill.active[data-owner="Moonraker"]{background:#00b86c;border-color:#00b86c}
.filter-pill.active[data-owner="Collaboration"]{background:#D97706;border-color:#D97706}
.filter-pill.active[data-owner="Client"]{background:#3B82F6;border-color:#3B82F6}
.filter-pill[data-owner="Moonraker"]:hover{border-color:#00b86c;color:#00b86c}
.filter-pill[data-owner="Collaboration"]:hover{border-color:#D97706;color:#D97706}
.filter-pill[data-owner="Client"]:hover{border-color:#3B82F6;color:#3B82F6}
.filter-pill .pill-count{opacity:.6;margin-left:.25rem}
</style>
</head>
<body>
<div id="loadingState" class="loading-state"><div class="spinner"></div><p style="margin-top:1rem;color:var(--color-muted);">Loading progress tracker...</p></div>
<div id="mainContent" style="display:none;">
<div class="progress-line" id="progressLine"></div>
<header class="header"><div class="container header-inner"><img src="/assets/logo.png" alt="Moonraker"><div class="header-meta"><p class="name" id="headerName"></p><p id="headerMeta"></p><p id="headerDate"></p></div></div></header>
<div class="suite-nav"><a id="navDiagnosis" href="#">Diagnosis</a><a id="navActionPlan" href="#">Action Plan</a><a href="#" class="active">Progress</a></div>
<button class="theme-toggle" id="themeBtn">&#x1F319;</button>
<nav class="section-nav" id="sectionNav">
  <a href="#stats"><span class="nav-dot"></span>Overview</a>
  <a href="#checklist"><span class="nav-dot"></span>Tasks</a>
  <a href="#rtpba"><span class="nav-dot"></span>Content</a>
</nav>
<section class="hero" id="stats"><div class="container">
  <div class="hero-layout">
    <div class="hero-content">
      <span class="badge">Progress Tracker</span>
      <h1 id="heroTitle">Your Progress</h1>
      <p class="subtitle">Track task completion in real time. Click any task to update its status.</p>
    </div>
    <div class="hero-visual">
      <div class="progress-ring-wrap" id="ringWrap">
        <svg viewBox="0 0 200 200" width="200" height="200">
          <circle class="progress-ring-bg" cx="100" cy="100" r="85"/>
          <circle class="progress-ring-fg" id="ringFg" cx="100" cy="100" r="85" stroke-dasharray="534.07" stroke-dashoffset="534.07"/>
        </svg>
        <div class="progress-ring-val">
          <div><span class="pct-num" id="pctNum">0</span><span class="pct-sign">%</span></div>
          <div class="pct-label">Complete</div>
        </div>
      </div>
    </div>
  </div>
  <div class="progress-hero">
    <div class="stat-row" id="statRow"></div>
  </div>
</div></section>
<hr class="divider">
<section id="checklist"><div class="container">
  <h2>Task Checklist</h2>
  <p style="color:var(--color-muted);margin-bottom:.75rem;">Click any task to cycle its status. Changes save automatically.</p>
  <div class="filter-pills" id="filterPills"></div>
  <div class="save-status" id="saveStatus"></div>
  <div id="taskList"></div>
</div></section>
<div id="rtpbaWrap"></div>
<footer class="footer"><div class="container"><p id="footerText"></p></div></footer>
</div>
<script>
(function(){
  var SB='https://ofmmwcjhdrhvxxkhcuww.supabase.co';
  var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mbW13Y2poZHJodnh4a2hjdXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjM1NTcsImV4cCI6MjA4OTg5OTU1N30.zMMHW0Fk9ixWjORngyxJTIoPOfx7GFsD4wBV4Foqqms';
  var parts=window.location.pathname.replace(/\/+$/,'').split('/');
  var SLUG=parts[1]||'';
  var allTasks=[];
  function sbH(){return {'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'}}
  function sb(p){return fetch(SB+'/rest/v1/'+p,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}}).then(function(r){if(!r.ok)throw new Error(r.status);return r.json()})}
  function esc(s){if(!s)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
  function fmtDate(d){if(!d)return '';try{return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}catch(e){return d}}
  if(!SLUG){document.getElementById('loadingState').innerHTML='<div style="text-align:center;padding:6rem 2rem;"><p style="color:var(--color-danger)">No client found. Check URL.</p></div>';return}
  Promise.all([
    sb('contacts?slug=eq.'+SLUG+'&select=id,slug,first_name,last_name,credentials,practice_name,city,state_province&limit=1'),
    sb('entity_audits?client_slug=eq.'+SLUG+'&order=audit_date.desc&limit=1'),
    sb('checklist_items?client_slug=eq.'+SLUG+'&web_visible=eq.true&order=sort_order')
  ]).then(function(res){
    var contacts=res[0]||[];
    var audits=res[1]||[];
    allTasks=res[2]||[];
    if(contacts.length===0)throw new Error('Not found');
    render(contacts[0],audits[0]||null);
  }).catch(function(){
    document.getElementById('loadingState').innerHTML='<header class="header"><div class="container header-inner"><img src="/assets/logo.png" alt="Moonraker"></div></header><div style="text-align:center;padding:6rem 2rem;"><p style="color:var(--color-danger)">Unable to load progress tracker. Contact support@moonraker.ai.</p></div>';
  });
  function render(contact,audit){
    var name=contact.practice_name||((contact.first_name||'')+' '+(contact.last_name||'')).trim();
    var creds=contact.credentials?', '+contact.credentials:'';
    var loc=[contact.city,contact.state_province].filter(Boolean).join(', ');
    document.getElementById('headerName').textContent='Prepared for '+(contact.first_name||'')+' '+(contact.last_name||'')+creds;
    document.getElementById('headerMeta').textContent=name+(loc?' \u00B7 '+loc:'');
    document.getElementById('headerDate').textContent=(audit?fmtDate(audit.audit_date):'')+' \u00B7 Confidential';
    document.title='Progress - '+name+' - Moonraker';
    var base='/'+SLUG;
    document.getElementById('navDiagnosis').href=base+'/audits/diagnosis';
    document.getElementById('navActionPlan').href=base+'/audits/action-plan';
    document.getElementById('heroTitle').textContent=name+': Progress Tracker';
    // RTPBA
    if(audit&&audit.scores&&audit.scores.rtpba){
      document.getElementById('rtpbaWrap').innerHTML='<hr class="divider"><section id="rtpba"><div class="container"><h2>Ready-to-Publish Content</h2><p style="color:var(--color-muted);margin-bottom:1.5rem;">Use this AI-optimized content for your homepage and target pages.</p><div class="rtpba-section">'+audit.scores.rtpba+'</div></div></section>';
    }
    document.getElementById('footerText').textContent='Prepared for '+(contact.first_name||'')+' '+(contact.last_name||'')+creds+' \u00B7 '+name+' \u00B7 Confidential';
    renderTasks();
    document.getElementById('loadingState').style.display='none';
    document.getElementById('mainContent').style.display='block';
  }
  var expandedTask=null;
  var currentFilter='all';
  window._setFilter=function(f){currentFilter=f;renderTasks()};
  function renderTasks(){
    var total=allTasks.length;
    var complete=allTasks.filter(function(t){return t.status==='complete'}).length;
    var ip=allTasks.filter(function(t){return t.status==='in_progress'}).length;
    var ns=total-complete-ip;
    var pct=total>0?Math.round(complete/total*100):0;
    document.getElementById('pctNum').textContent=pct;
    var circumference=2*Math.PI*85;
    var offset=circumference-(pct/100*circumference);
    document.getElementById('ringFg').style.strokeDashoffset=offset;
    var moon=allTasks.filter(function(t){return t.owner==='Moonraker'}).length;
    var cli=allTasks.filter(function(t){return t.owner==='Client'}).length;
    var collab=allTasks.filter(function(t){return t.owner==='Collaboration'}).length;
    document.getElementById('statRow').innerHTML=
      '<div class="stat-box"><div class="stat-val">'+total+'</div><div class="stat-label">Total</div></div>'+
      '<div class="stat-box"><div class="stat-val" style="color:var(--color-info)">'+ip+'</div><div class="stat-label">In Progress</div></div>'+
      '<div class="stat-box"><div class="stat-val" style="color:var(--color-success)">'+complete+'</div><div class="stat-label">Complete</div></div>'+
      '<div class="stat-box"><div class="stat-val" style="color:#00b86c">'+moon+'</div><div class="stat-label">Moonraker</div></div>'+
      '<div class="stat-box"><div class="stat-val" style="color:#D97706">'+collab+'</div><div class="stat-label">Collaboration</div></div>'+
      '<div class="stat-box"><div class="stat-val" style="color:#3B82F6">'+cli+'</div><div class="stat-label">Client</div></div>';
    // Filter pills
    var filters=[{key:'all',label:'All',count:total},{key:'Moonraker',label:'Moonraker',count:moon},{key:'Collaboration',label:'Collaboration',count:collab},{key:'Client',label:'Client',count:cli}];
    var fp='';
    filters.forEach(function(f){
      fp+='<span class="filter-pill'+(currentFilter===f.key?' active':'')+'" data-owner="'+f.key+'" onclick="window._setFilter(\''+f.key+'\')">'+f.label+'<span class="pill-count">'+f.count+'</span></span>';
    });
    document.getElementById('filterPills').innerHTML=fp;
    // Filter tasks
    var filtered=currentFilter==='all'?allTasks:allTasks.filter(function(t){return t.owner===currentFilter});
    var phases={};var order=[];
    filtered.forEach(function(t){var ph=t.phase||'Other';if(!phases[ph]){phases[ph]=[];order.push(ph)}phases[ph].push(t)});
    var h='';
    order.forEach(function(phase){
      h+='<div class="phase-label">'+esc(phase)+'</div>';
      phases[phase].forEach(function(t){
        var cls=t.status==='complete'?'complete':t.status==='in_progress'?'in_progress':'not_started';
        var check=t.status==='complete'?'&#10003;':t.status==='in_progress'?'&#9654;':'';
        var isExpanded=expandedTask===t.id;
        h+='<div class="task-item '+cls+(isExpanded?' expanded':'')+'" onclick="window._toggleExpand(\''+t.id+'\')">';
        h+='<div class="task-check" onclick="event.stopPropagation();window._cycleTask(\''+t.id+'\')">'+check+'</div>';
        h+='<div class="task-text"><div class="task-text-title">'+esc(t.title)+'</div>';
        h+='<div class="task-text-meta">';
        if(t.owner)h+='<span class="task-owner-tag '+t.owner.toLowerCase()+'">'+esc(t.owner)+'</span>';
        if(t.priority)h+='<span class="task-priority-tag">'+t.priority+'</span>';
        if(t.category)h+='<span style="color:var(--color-muted)">'+esc(t.category)+'</span>';
        h+='</div></div>';
        h+='<span class="task-expand-arrow">&#9654;</span>';
        h+='</div>';
        // Detail panel
        if(isExpanded){
          h+='<div class="task-detail open">';
          if(t.description){
            var parts=t.description.split('\n\n');
            if(parts[0])h+='<div class="task-detail-label">Details</div><p>'+esc(parts[0])+'</p>';
            if(parts[1])h+='<div class="task-detail-label">How to Fix</div>'+parts[1];
          }
          var metaParts=[];
          if(t.scope)metaParts.push('Scope: '+t.scope);
          if(t.category)metaParts.push('Category: '+t.category);
          if(t.owner)metaParts.push('Owner: '+t.owner);
          if(t.priority)metaParts.push('Priority: '+t.priority);
          if(metaParts.length>0)h+='<div style="margin-top:.75rem;font-size:.78rem;color:var(--color-muted);">'+metaParts.join(' &middot; ')+'</div>';
          h+='</div>';
        }
      });
    });
    document.getElementById('taskList').innerHTML=h;
  }
  window._toggleExpand=function(id){expandedTask=expandedTask===id?null:id;renderTasks();};
  window._cycleTask=function(taskId){
    var task=allTasks.find(function(t){return t.id===taskId});
    if(!task)return;
    // Cycle: not_started -> in_progress -> complete -> not_started
    var next=task.status==='not_started'?'in_progress':task.status==='in_progress'?'complete':'not_started';
    task.status=next;
    renderTasks();
    // Save to Supabase
    document.getElementById('saveStatus').textContent='Saving...';
    fetch(SB+'/rest/v1/checklist_items?id=eq.'+taskId,{
      method:'PATCH',
      headers:Object.assign({},sbH(),{'Prefer':'return=minimal'}),
      body:JSON.stringify({status:next,updated_at:new Date().toISOString(),completed_at:next==='complete'?new Date().toISOString():null})
    }).then(function(r){
      if(r.ok)document.getElementById('saveStatus').textContent='Saved: '+new Date().toLocaleTimeString();
      else throw new Error(r.status);
    }).catch(function(e){
      document.getElementById('saveStatus').textContent='Save failed (changes kept locally)';
    });
  };
  var tb=document.getElementById('themeBtn');
  var ct=document.documentElement.getAttribute('data-theme');
  if(tb){tb.innerHTML=ct==='dark'?'&#9728;&#65039;':'&#x1F319;';tb.addEventListener('click',function(){
    var h=document.documentElement;
    function apply(){
      if(h.getAttribute('data-theme')==='light'){h.setAttribute('data-theme','dark');tb.innerHTML='&#9728;&#65039;';try{localStorage.setItem('moonraker-theme','dark')}catch(e){}}
      else{h.setAttribute('data-theme','light');tb.innerHTML='&#x1F319;';try{localStorage.setItem('moonraker-theme','light')}catch(e){}}
    }
    if(document.startViewTransition){document.startViewTransition(apply)}else{apply()}
  })}
  var pLine=document.getElementById('progressLine');
  function onScroll(){
    var st=window.scrollY;var dh=document.documentElement.scrollHeight-window.innerHeight;
    if(pLine)pLine.style.width=(dh>0?(st/dh)*100:0)+'%';
    var secs=document.querySelectorAll('section[id]');var cur='';
    secs.forEach(function(s){if(st>=s.offsetTop-200)cur=s.id});
    if(!cur&&secs.length>0)cur=secs[0].id;
    document.querySelectorAll('.section-nav a').forEach(function(l){l.classList.toggle('active',l.getAttribute('href')==='#'+cur)});
  }
  window.addEventListener('scroll',onScroll);
  setTimeout(function(){onScroll()},100);})();
</script>
</body>
</html>
